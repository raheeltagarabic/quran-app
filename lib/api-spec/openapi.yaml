openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Quran Qaida Class Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: topics
    description: Islamic Basics topics
  - name: questions
    description: Test questions
  - name: results
    description: Test results
  - name: recordings
    description: Audio recordings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students (teacher only)
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentWithUser"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a new student profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Created student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/me:
    get:
      operationId: getMyStudentProfile
      tags: [students]
      summary: Get the current student's profile
      responses:
        "200":
          description: Student profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentWithUser"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentWithUser"
    put:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /students/{id}/recordings:
    get:
      operationId: getStudentRecordings
      tags: [recordings]
      summary: Get recordings for a student
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of recordings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recording"

  /students/{id}/results:
    get:
      operationId: getStudentResults
      tags: [results]
      summary: Get test results for a student
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResultWithTopic"

  /recordings:
    post:
      operationId: createRecording
      tags: [recordings]
      summary: Create a new recording entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecordingBody"
      responses:
        "201":
          description: Created recording
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recording"

  /recordings/upload:
    post:
      operationId: uploadRecording
      tags: [recordings]
      summary: Upload audio recording file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                audio:
                  type: string
                  format: binary
              required:
                - audio
      responses:
        "200":
          description: Upload result with URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /topics:
    get:
      operationId: listTopics
      tags: [topics]
      summary: List all topics
      responses:
        "200":
          description: List of topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topic"
    post:
      operationId: createTopic
      tags: [topics]
      summary: Create a new topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicBody"
      responses:
        "201":
          description: Created topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"

  /topics/{id}:
    get:
      operationId: getTopic
      tags: [topics]
      summary: Get a topic with its questions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicWithQuestions"
    put:
      operationId: updateTopic
      tags: [topics]
      summary: Update a topic
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopicBody"
      responses:
        "200":
          description: Updated topic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topic"
    delete:
      operationId: deleteTopic
      tags: [topics]
      summary: Delete a topic
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /questions:
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a question for a topic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Created question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions/{id}:
    put:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /results:
    post:
      operationId: submitTestResult
      tags: [results]
      summary: Submit a test result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitResultBody"
      responses:
        "201":
          description: Saved result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Result"

  /mobile-auth/token-exchange:
    post:
      operationId: exchangeMobileAuthorizationCode
      tags: [auth]
      summary: Exchange mobile auth code for session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeBody"
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeMobileAuthorizationCodeResponse"

  /mobile-auth/logout:
    post:
      operationId: logoutMobileSession
      tags: [auth]
      summary: Logout mobile session
      responses:
        "200":
          description: Logout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutMobileSessionResponse"

  /users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (teacher only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        isAuthenticated:
          type: boolean
      required:
        - isAuthenticated

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          nullable: true
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profileImageUrl:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
      required:
        - id

    Student:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        scheduleType:
          type: string
        currentLesson:
          type: integer
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - scheduleType
        - currentLesson

    StudentWithUser:
      allOf:
        - $ref: "#/components/schemas/Student"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/UserProfile"

    CreateStudentBody:
      type: object
      properties:
        userId:
          type: string
        scheduleType:
          type: string
        currentLesson:
          type: integer
        notes:
          type: string
      required:
        - userId
        - scheduleType

    UpdateStudentBody:
      type: object
      properties:
        scheduleType:
          type: string
        currentLesson:
          type: integer
        notes:
          type: string

    Topic:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title

    TopicWithQuestions:
      allOf:
        - $ref: "#/components/schemas/Topic"
        - type: object
          properties:
            questions:
              type: array
              items:
                $ref: "#/components/schemas/Question"

    CreateTopicBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required:
        - title

    Question:
      type: object
      properties:
        id:
          type: integer
        topicId:
          type: integer
        question:
          type: string
        questionType:
          type: string
        options:
          type: array
          items:
            type: string
          nullable: true
        correctAnswer:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - topicId
        - question
        - questionType
        - correctAnswer

    CreateQuestionBody:
      type: object
      properties:
        topicId:
          type: integer
        question:
          type: string
        questionType:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: string
      required:
        - topicId
        - question
        - questionType
        - correctAnswer

    Result:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        topicId:
          type: integer
        score:
          type: number
        totalQuestions:
          type: integer
        date:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - topicId
        - score
        - totalQuestions

    ResultWithTopic:
      allOf:
        - $ref: "#/components/schemas/Result"
        - type: object
          properties:
            topic:
              $ref: "#/components/schemas/Topic"

    SubmitResultBody:
      type: object
      properties:
        studentId:
          type: integer
        topicId:
          type: integer
        score:
          type: number
        totalQuestions:
          type: integer
      required:
        - studentId
        - topicId
        - score
        - totalQuestions

    Recording:
      type: object
      properties:
        id:
          type: integer
        studentId:
          type: integer
        lesson:
          type: integer
        audioUrl:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - studentId
        - lesson
        - audioUrl

    CreateRecordingBody:
      type: object
      properties:
        studentId:
          type: integer
        lesson:
          type: integer
        audioUrl:
          type: string
      required:
        - studentId
        - lesson
        - audioUrl

    UploadResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    ExchangeMobileAuthorizationCodeBody:
      type: object
      properties:
        code:
          type: string
        code_verifier:
          type: string
        redirect_uri:
          type: string
        state:
          type: string
        nonce:
          type: string
          nullable: true
      required:
        - code
        - code_verifier
        - redirect_uri
        - state

    ExchangeMobileAuthorizationCodeResponse:
      type: object
      properties:
        token:
          type: string
      required:
        - token

    LogoutMobileSessionResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
